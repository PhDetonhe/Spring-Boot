#SMTP significa Simple Mail Transfer Protocol (Protocolo Simples de Transferï¿½ncia de Correio).
#O que ï¿½ SMTP?
#ï¿½ o protocolo padrï¿½o utilizado para enviar emails na internet. Pense nele como o "carteiro digital" que transporta suas mensagens de um servidor para outro atï¿½ chegar ao destino.

#SSL significa Secure Sockets Layer (Camada de Soquetes Segura).
#O que ï¿½ SSL?
#ï¿½ um protocolo de seguranï¿½a que criptografa a comunicaï¿½ï¿½o entre dois sistemas (como seu aplicativo e o servidor do Gmail), garantindo que os dados trafeguem de forma segura e nï¿½o possam ser interceptados ou lidos por terceiros.



#Define o servidor SMTP do Gmail que serï¿½ usado para enviar os emails
spring.mail.host=smtp.gmail.com

#Porta para conexï¿½o SMTP com SSL (465 ï¿½ a porta padrï¿½o para SMTP com SSL)
spring.mail.port=456

#Seu endereï¿½o de email do Gmail que serï¿½ usado como remetente
spring.mail.username=test3mail5566@gmail.com

#Senha de aplicativo do Gmail (nï¿½o ï¿½ sua senha normal do Google, mas uma senha especï¿½fica gerada para aplicativos)
spring.mail.password=

#Habilita autenticaï¿½ï¿½o SMTP - necessï¿½rio para provar que vocï¿½ ï¿½ quem diz ser
spring.mail.properties.mail.smtp.auth=true

#Ativa o uso de SSL na conexï¿½o, criptografando a comunicaï¿½ï¿½o
spring.mail.properties.mail.smtp.ssl.enable=true

#Define que o servidor smtp.gmail.com ï¿½ confiï¿½vel para conexï¿½es SSL
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com


#Tempo mï¿½ximo (em milissegundos) para estabelecer a conexï¿½o inicial (10 segundos)
spring.mail.properties.mail.smtp.connectiontimeout = 10000

#Timeout de leitura de dados do servidor (10 segundos)
spring.mail.properties.mail.smtp.timeout=10000

#Timeout para escrita de dados para o servidor (10 segundos)
spring.mail.properties.mail.smtp.writetimeout=10000

#Ativa logs detalhados do mï¿½dulo de email do Spring Framework
logging.level.org.springframework.mail=DEBUG

#Ativa logs detalhados da biblioteca Angus Mail (implementaï¿½ï¿½o JavaMail usada pelo Spring)
