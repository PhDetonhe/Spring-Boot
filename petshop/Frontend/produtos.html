<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="bg-slate-300">

    <!-- NAV -->
    <nav class="bg-slate-400 shadow-md ">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">

                <div class="text-blue-900 text-3xl font-bold hover:text-white transition">
                    <a href="main.html">PetShop</a>
                </div>

                <div class="hidden md:flex flex-1 mx-6">
                    <input type="text" placeholder="O que seu pet precisa"
                        class="w-96 px-4 py-2 rounded-l-lg outline-none">
                    <button class="bg-blue-900 text-white px-4 rounded-r-lg">
                        🔍
                    </button>
                </div>

                <div class="flex items-center gap-4 text-xl">

                    <button onclick="abrirProdutos()"
                        class="bg-gradient-to-r from-blue-500 to-blue-900 text-white px-4 py-2 rounded-xl shadow">
                        +
                    </button>

                </div>
            </div>
        </div>
    </nav>

    <section class="flex flex-wrap justify-center p-6">
        <div id="sectionsprodutos" class="flex flex-wrap justify-center gap-6"></div>
    </section>

    <div id="overlayP"
        class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 px-4">

        <form id="registroForm"
            class="bg-slate-400 rounded-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto relative shadow-2xl">

            <button type="button" onclick="fecharProdutos()"
                class="absolute top-4 right-4 text-xl font-bold text-white">
                ✕
            </button>

            <h2 class="text-xl font-bold text-center mb-2 text-white">
                Adicione um produto:
            </h2>

            <input id="nome" type="text" placeholder="Nome"
                class="w-full mb-3 p-3 border rounded-lg bg-white text-black">

            <input id="descricao" type="text" placeholder="Descrição"
                class="w-full mb-3 p-3 border rounded-lg bg-white text-black">

            <input id="preco" type="number" placeholder="Preço"
                class="w-full mb-3 p-3 border rounded-lg bg-white text-black">

            <input id="preco_desconto" type="number" placeholder="Preço com desconto"
                class="w-full mb-3 p-3 border rounded-lg bg-white text-black">

            <input id="qtd_estoque" type="number" placeholder="Quantidade em estoque"
                class="w-full mb-3 p-3 border rounded-lg bg-white text-black">

            <input id="categoria" type="number" placeholder="ID da categoria"
                class="w-full mb-3 p-3 border rounded-lg bg-white text-black">

            <button type="submit"
                class="w-full bg-blue-950 text-white py-3 rounded-lg font-semibold">
                Continuar
            </button>

            

<p id="erro" class="text-red-500 mt-2"></p>
<p id="resultado" class="text-green-500 mt-2"></p>

        </form>
    </div>

    <script src="js/modal.js"></script>
    <script src="js/fetchProdutos.js"></script>

</body>
</html>
